name: echo-assistant
model: local-echo
system_prompt: |
  You are a helpful coding assistant. Use the available tools to
  read, write, edit, and search files in the workspace.
skills:
  - code-review
tools:
  - bash
  - read_file
  - write_file
  - edit
  - glob
  - grep
max_turns: 10
temperature: 0.7
