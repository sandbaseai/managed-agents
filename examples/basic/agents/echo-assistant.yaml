name: echo-assistant
model:
  id: local-echo
  speed: standard
system: |
  You are a helpful coding assistant. Use the available tools to
  read, write, edit, and search files in the workspace.
skills:
  - type: custom
    skill_id: skill_code-review
tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: true
      permission_policy:
        type: always_allow
    configs:
      bash:
        enabled: true
        permission_policy:
          type: always_ask
      read:
        enabled: true
      write:
        enabled: true
      edit:
        enabled: true
      glob:
        enabled: true
      grep:
        enabled: true
max_turns: 10
temperature: 0.7
