name: echo-assistant
model: local-echo
system: |
  You are a helpful coding assistant. Use the available tools to
  read, write, edit, and search files in the workspace.
skills:
  - type: custom
    skill_id: skill_code-review
tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: true
      permission_policy:
        type: always_allow
    configs:
      - name: bash
        enabled: true
        permission_policy:
          type: always_ask
      - name: read
        enabled: true
      - name: write
        enabled: true
      - name: edit
        enabled: true
      - name: glob
        enabled: true
      - name: grep
        enabled: true
max_turns: 10
temperature: 0.7
