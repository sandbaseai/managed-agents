name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  no-chinese:
    name: No Chinese Characters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Chinese characters in source files
        run: |
          # Find Chinese characters in source code, comments, and config files
          # Exclude: node_modules, .git, binary files, lock files
          FOUND=$(grep -rPn '[\x{4e00}-\x{9fff}\x{3400}-\x{4dbf}\x{f900}-\x{faff}]' \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            --include="*.jsx" \
            --include="*.json" \
            --include="*.yaml" \
            --include="*.yml" \
            --include="*.md" \
            --include="*.css" \
            --include="*.html" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=references \
            --exclude-dir=spec \
            . 2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "❌ Chinese characters found in source files:"
            echo "$FOUND"
            echo ""
            echo "All code, comments, and documentation must be in English."
            exit 1
          else
            echo "✅ No Chinese characters found in source files."
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
